steps:
  # 1. Install Dependencies (Directly on the builder machine)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install', '--legacy-peer-deps']

  # 2. Build the App (Inject the Key HERE - No Docker involvement yet)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}'

  # 3. Package the built app into Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'gcr.io/$PROJECT_ID/style-confident-ai:$COMMIT_SHA',
      '.'
    ]

  # 4. Push Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/style-confident-ai:$COMMIT_SHA']

  # 5. Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'digitalstylist'
      - '--image'
      - 'gcr.io/$PROJECT_ID/style-confident-ai:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

substitutions:
  _VITE_GEMINI_API_KEY: 'PLACEHOLDER'

images:
  - 'gcr.io/$PROJECT_ID/style-confident-ai:$COMMIT_SHA'
