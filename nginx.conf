server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Main SPA route handling
    location / {
        try_files $uri /index.html;
    }

    # Static assets (images, fonts, js, css)
    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico|css|js|map|woff|woff2|ttf|eot)$ {
        try_files $uri /index.html;
        access_log off;
        expires 1y;
    }
}
