steps:
  # STEP 0: Force-write the API Key into a .env file
  # This happens in the build server, before Docker starts.
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}" > .env
        echo "Created .env file with API Key"

  # STEP 1: Build Docker Image
  # Since .env exists now, Docker will copy it in automatically.
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'gcr.io/$PROJECT_ID/style-confident-ai:$COMMIT_SHA',
      '.'
    ]

  # STEP 2: Push Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/style-confident-ai:$COMMIT_SHA']

  # STEP 3: Deploy to 'digitalstylist'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'digitalstylist'
      - '--image'
      - 'gcr.io/$PROJECT_ID/style-confident-ai:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

substitutions:
  _VITE_GEMINI_API_KEY: 'PLACEHOLDER'

images:
  - 'gcr.io/$PROJECT_ID/style-confident-ai:$COMMIT_SHA'
